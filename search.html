<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Consumer — RJB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header__brand">
      <img class="header__logo" src="rjb-logo.png" alt="RJB Logo" onerror="this.style.display='none'">
      <span class="header__title">Rajasthan Jal Board</span>
    </div>
    <div class="header__right">
      <span class="header__user" id="headerUser"></span>
      <button class="header__logout" id="logoutBtn">Logout</button>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="card section">
        <h1 style="font-size:1.4rem;color:var(--primary);margin-bottom:1rem;">Search Consumer</h1>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Enter CIN No or Meter Serial Number" inputmode="text" autocomplete="off">
          <button class="btn btn-primary" id="searchBtn">Search</button>
        </div>
        <button class="btn btn-secondary mt-1" id="clearBtn" style="width:100%">Clear</button>
      </div>

      <div id="loadingSpinner" class="loading-spinner hidden">
        <div class="loading-spinner__ring"></div>
        <span>Searching…</span>
      </div>

      <div id="errorMsg" class="alert alert-danger hidden"></div>

      <!-- Consumer Info Panel -->
      <div id="consumerPanel" class="card section hidden">
        <div id="statusBanner" class="alert alert-warning hidden"></div>
        <p class="section-title">Consumer Information</p>
        <div class="info-panel" id="consumerInfo"></div>
        <hr class="divider">
        <div class="btn-group mt-1">
          <button class="btn btn-primary flex-1" id="enterReadingBtn">Enter Reading</button>
          <button class="btn btn-secondary flex-1" id="viewLedgerBtn">View Ledger</button>
        </div>
      </div>

      <div id="notFoundMsg" class="alert alert-info hidden">No consumer found matching that CIN No or Meter Serial Number.</div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, doc, getDoc, collection, query, where, getDocs, limit } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { firebaseConfig } from './firebase_config.js';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentConsumer = null;

    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      const profile = JSON.parse(sessionStorage.getItem('meter_reader_profile') || '{}');
      document.getElementById('headerUser').textContent = profile.name || user.email;
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      sessionStorage.clear();
      window.location.href = 'index.html';
    });

    document.getElementById('searchBtn').addEventListener('click', doSearch);
    document.getElementById('searchInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doSearch();
    });
    document.getElementById('clearBtn').addEventListener('click', clearAll);

    function clearAll() {
      document.getElementById('searchInput').value = '';
      document.getElementById('consumerPanel').classList.add('hidden');
      document.getElementById('errorMsg').classList.add('hidden');
      document.getElementById('notFoundMsg').classList.add('hidden');
      currentConsumer = null;
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function statusBadgeClass(status) {
      const map = {
        'Active': 'status-badge--active',
        'Inactive': 'status-badge--inactive',
        'Meter Faulty': 'status-badge--meter-faulty',
        'Disconnected': 'status-badge--disconnected',
        'Disputed': 'status-badge--disputed'
      };
      return map[status] || 'status-badge--inactive';
    }

    function formatDate(ts) {
      if (!ts) return '—';
      let d;
      if (ts.toDate) d = ts.toDate();
      else if (ts instanceof Date) d = ts;
      else d = new Date(ts);
      const dd = String(d.getDate()).padStart(2,'0');
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const yyyy = d.getFullYear();
      return `${dd}-${mm}-${yyyy}`;
    }

    function renderConsumer(c) {
      currentConsumer = c;

      // Status banner
      const banner = document.getElementById('statusBanner');
      if (c.consumer_status && c.consumer_status !== 'Active') {
        banner.textContent = `⚠ ${c.consumer_status}`;
        banner.classList.remove('hidden');
      } else {
        banner.classList.add('hidden');
      }

      // Info panel
      const rows = [
        ['CIN No.', c.cin_no],
        ['Name', c.name],
        ['Zone', c.zone],
        ['Category', c.category],
        ['Meter Size', c.meter_size],
        ['Meter Serial No.', c.meter_serial_no],
        ['Last Reading', c.last_reading != null ? `${Number(c.last_reading).toFixed(2)} KL` : '—'],
        ['Status', `<span class="status-badge ${statusBadgeClass(c.consumer_status)}">${c.consumer_status || '—'}</span>`],
        ['Address', [c.address_area_location, c.address_landmark, c.address_pin_code].filter(Boolean).join(', ') || '—'],
        ['Contact', c.contact_number || '—'],
      ];

      document.getElementById('consumerInfo').innerHTML = rows.map(([label, val]) =>
        `<div class="info-panel__row">
          <span class="info-panel__label">${label}</span>
          <span class="info-panel__value">${val || '—'}</span>
        </div>`
      ).join('');

      document.getElementById('consumerPanel').classList.remove('hidden');
      document.getElementById('notFoundMsg').classList.add('hidden');

      document.getElementById('enterReadingBtn').onclick = () => {
        window.location.href = `reading.html?cin=${encodeURIComponent(c.cin_no)}`;
      };
      document.getElementById('viewLedgerBtn').onclick = () => {
        window.location.href = `ledger.html?cin=${encodeURIComponent(c.cin_no)}`;
      };
    }

    async function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) {
        showError('Please enter a CIN No or Meter Serial Number.');
        return;
      }
      document.getElementById('errorMsg').classList.add('hidden');
      document.getElementById('consumerPanel').classList.add('hidden');
      document.getElementById('notFoundMsg').classList.add('hidden');
      document.getElementById('loadingSpinner').classList.remove('hidden');

      try {
        // Try by CIN No (direct get)
        const cinDoc = await getDoc(doc(db, 'consumers', q));
        if (cinDoc.exists()) {
          renderConsumer({ cin_no: cinDoc.id, ...cinDoc.data() });
          document.getElementById('loadingSpinner').classList.add('hidden');
          return;
        }

        // Try by meter serial no (indexed query)
        const msnQuery = query(
          collection(db, 'consumers'),
          where('meter_serial_no', '==', q),
          limit(1)
        );
        const snap = await getDocs(msnQuery);
        if (!snap.empty) {
          const d = snap.docs[0];
          renderConsumer({ cin_no: d.id, ...d.data() });
          document.getElementById('loadingSpinner').classList.add('hidden');
          return;
        }

        document.getElementById('notFoundMsg').classList.remove('hidden');
      } catch (err) {
        showError('Search failed. Please check your connection and try again.');
      } finally {
        document.getElementById('loadingSpinner').classList.add('hidden');
      }
    }
  </script>
</body>
</html>
