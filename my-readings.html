<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Readings — RJB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header__brand">
      <img class="header__logo" src="rjb-logo.png" alt="RJB Logo" onerror="this.style.display='none'">
      <span class="header__title">Rajasthan Jal Board</span>
    </div>
    <div class="header__right">
      <span class="header__user" id="headerUser"></span>
      <button class="header__logout" id="logoutBtn">Logout</button>
    </div>
  </header>

  <main>
    <div class="container">
      <!-- Filter Section -->
      <div class="card section">
        <p class="section-title">My Submitted Readings</p>
        <div class="d-flex gap-1">
          <div class="form-group flex-1">
            <label for="dateFrom">From</label>
            <input type="date" id="dateFrom">
          </div>
          <div class="form-group flex-1">
            <label for="dateTo">To</label>
            <input type="date" id="dateTo">
          </div>
        </div>
        <button class="btn btn-primary btn-full" id="loadBtn">Load Readings</button>
      </div>

      <div id="loadingSpinner" class="loading-spinner hidden">
        <div class="loading-spinner__ring"></div>
        <span>Loading readings…</span>
      </div>
      <div id="errorMsg" class="alert alert-danger hidden"></div>

      <!-- Readings Table -->
      <div id="resultsSection" class="hidden">
        <div class="card section">
          <p class="section-title">Results</p>
          <div id="resultCount" class="text-muted mb-1" style="font-size:0.9rem;"></div>
          <div class="ledger-table-wrapper">
            <table class="ledger-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Time</th>
                  <th>CIN</th>
                  <th>Consumption</th>
                  <th class="right">Bill</th>
                  <th>Status</th>
                  <th>Query</th>
                </tr>
              </thead>
              <tbody id="readingsBody"></tbody>
            </table>
          </div>
          <button class="btn btn-secondary btn-full mt-1 hidden" id="loadMoreBtn">Load More</button>
        </div>
      </div>

      <!-- Bill Breakdown Modal -->
      <div id="breakdownModal" class="hidden">
        <div class="card section" style="border: 2px solid var(--primary);">
          <div class="d-flex" style="justify-content:space-between;align-items:center;">
            <p class="section-title" style="margin:0;">Bill Breakdown</p>
            <button class="btn btn-secondary" id="closeBreakdownBtn" style="padding:0.25rem 0.75rem;">✕ Close</button>
          </div>
          <div class="info-panel mt-1" id="breakdownConsumerInfo"></div>
          <div class="bill-preview mt-1" id="breakdownBill">
            <div class="bill-preview__header">Bill Details</div>
            <table>
              <tbody id="breakdownBillBody"></tbody>
              <tfoot>
                <tr class="bill-preview__total">
                  <td>TOTAL</td>
                  <td id="breakdownBillTotal"></td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import {
      getFirestore, collection, query, where, getDocs, orderBy,
      Timestamp, startAfter, limit as fsLimit
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { firebaseConfig } from './firebase_config.js';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const PAGE_SIZE = 50;
    let currentUser = null;
    let readerProfile = null;
    let lastDoc = null;
    let hasMore = false;
    let currentReadings = [];
    let queryConstraints = null;

    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      currentUser = user;
      readerProfile = JSON.parse(sessionStorage.getItem('meter_reader_profile') || '{}');
      document.getElementById('headerUser').textContent = readerProfile.name || user.email;

      // Default date range: last 30 days
      const today = new Date();
      const thirtyDaysAgo = new Date(today);
      thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
      document.getElementById('dateTo').value = today.toISOString().split('T')[0];
      document.getElementById('dateFrom').value = thirtyDaysAgo.toISOString().split('T')[0];
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      sessionStorage.clear();
      window.location.href = 'index.html';
    });

    document.getElementById('loadBtn').addEventListener('click', () => loadReadings(true));
    document.getElementById('loadMoreBtn').addEventListener('click', () => loadReadings(false));
    document.getElementById('closeBreakdownBtn').addEventListener('click', () => {
      document.getElementById('breakdownModal').classList.add('hidden');
    });

    function formatCurrency(n) {
      if (n == null) return '—';
      return '₹' + Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function formatTs(ts) {
      if (!ts) return '—';
      let d;
      if (ts.toDate) d = ts.toDate();
      else d = new Date(ts);
      return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
    }

    async function loadReadings(fresh) {
      hideError();
      const fromVal = document.getElementById('dateFrom').value;
      const toVal = document.getElementById('dateTo').value;
      if (!fromVal || !toVal) {
        showError('Please select both date range values.');
        return;
      }

      const fromDate = new Date(fromVal);
      const toDate = new Date(toVal);
      toDate.setHours(23, 59, 59, 999);

      if (fresh) {
        lastDoc = null;
        currentReadings = [];
        document.getElementById('readingsBody').innerHTML = '';
        document.getElementById('loadMoreBtn').classList.add('hidden');
        document.getElementById('resultsSection').classList.add('hidden');
      }

      document.getElementById('loadingSpinner').classList.remove('hidden');

      try {
        const fromTs = Timestamp.fromDate(fromDate);
        const toTs = Timestamp.fromDate(toDate);

        let q;
        if (lastDoc) {
          q = query(
            collection(db, 'readings'),
            where('reader_uid', '==', currentUser.uid),
            where('submitted_at', '>=', fromTs),
            where('submitted_at', '<=', toTs),
            orderBy('submitted_at', 'desc'),
            startAfter(lastDoc),
            fsLimit(PAGE_SIZE)
          );
        } else {
          q = query(
            collection(db, 'readings'),
            where('reader_uid', '==', currentUser.uid),
            where('submitted_at', '>=', fromTs),
            where('submitted_at', '<=', toTs),
            orderBy('submitted_at', 'desc'),
            fsLimit(PAGE_SIZE)
          );
        }

        const snap = await getDocs(q);
        const docs = snap.docs;
        hasMore = docs.length === PAGE_SIZE;
        if (docs.length > 0) lastDoc = docs[docs.length - 1];

        const newReadings = docs.map(d => ({ id: d.id, ...d.data() }));
        currentReadings = fresh ? newReadings : [...currentReadings, ...newReadings];

        renderReadings(newReadings, fresh);
        document.getElementById('resultsSection').classList.remove('hidden');
        document.getElementById('resultCount').textContent = `Showing ${currentReadings.length} reading(s)`;

        if (hasMore) {
          document.getElementById('loadMoreBtn').classList.remove('hidden');
        } else {
          document.getElementById('loadMoreBtn').classList.add('hidden');
        }
      } catch (err) {
        showError('Failed to load readings. Please check your connection and try again.');
      } finally {
        document.getElementById('loadingSpinner').classList.add('hidden');
      }
    }

    function getQueryStatusBadge(reading) {
      if (!reading._queryStatus) return '<span class="text-muted">—</span>';
      const map = {
        pending: '<span class="status-badge status-badge--meter-faulty">Pending</span>',
        approved: '<span class="status-badge status-badge--active">Approved</span>',
        rejected: '<span class="status-badge status-badge--disconnected">Rejected</span>'
      };
      return map[reading._queryStatus] || '—';
    }

    async function fetchQueryStatuses(readings) {
      // Batch-check correction queries for these reading IDs
      const ids = readings.map(r => r.id);
      if (ids.length === 0) return;
      // Firestore 'in' query is limited to 30 items
      const chunks = [];
      for (let i = 0; i < ids.length; i += 30) chunks.push(ids.slice(i, i+30));
      const queryMap = {};
      for (const chunk of chunks) {
        const snap = await getDocs(query(
          collection(db, 'correction_queries'),
          where('reading_id', 'in', chunk)
        ));
        snap.docs.forEach(d => {
          const data = d.data();
          queryMap[data.reading_id] = data.status;
        });
      }
      // Update table cells
      readings.forEach(r => {
        const cell = document.getElementById(`qstatus-${r.id}`);
        if (cell) {
          const status = queryMap[r.id];
          if (status) {
            const map = {
              pending: '<span class="status-badge status-badge--meter-faulty">Pending</span>',
              approved: '<span class="status-badge status-badge--active">Approved</span>',
              rejected: '<span class="status-badge status-badge--disconnected">Rejected</span>'
            };
            cell.innerHTML = map[status] || '—';
          }
        }
      });
    }

    function renderReadings(readings, fresh) {
      const tbody = document.getElementById('readingsBody');
      if (fresh) tbody.innerHTML = '';

      if (readings.length === 0 && fresh) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-muted text-center">No readings found for this date range.</td></tr>';
        return;
      }

      readings.forEach(r => {
        const date = r.reading_date || formatTs(r.submitted_at);
        const time = r.reading_time || '—';
        const consumption = r.consumption != null ? `${Number(r.consumption).toFixed(2)} KL` : '—';
        const bill = r.full_bill_breakdown;
        const total = bill ? formatCurrency(bill.total_amount) : '—';

        let statusBadge = '—';
        if (r.status === 'finalized') statusBadge = '<span class="status-badge status-badge--active">Finalized</span>';
        else if (r.status === 'skipped') statusBadge = '<span class="status-badge status-badge--meter-faulty">Cannot Read</span>';

        const tr = document.createElement('tr');
        tr.style.cursor = 'pointer';
        tr.innerHTML = `
          <td>${date}</td>
          <td>${time}</td>
          <td class="font-mono">${r.cin_no}</td>
          <td>${consumption}</td>
          <td class="right">${total}</td>
          <td>${statusBadge}</td>
          <td id="qstatus-${r.id}">—</td>
        `;
        tr.addEventListener('click', () => showBreakdown(r));
        tbody.appendChild(tr);
      });

      // Async load query statuses (non-blocking)
      fetchQueryStatuses(readings).catch(() => {});
    }

    function showBreakdown(reading) {
      const bill = reading.full_bill_breakdown;
      const tbody = document.getElementById('breakdownBillBody');
      tbody.innerHTML = '';

      // Consumer info
      document.getElementById('breakdownConsumerInfo').innerHTML = `
        <div class="info-panel__row"><span class="info-panel__label">CIN No.</span><span class="info-panel__value">${reading.cin_no}</span></div>
        <div class="info-panel__row"><span class="info-panel__label">Date</span><span class="info-panel__value">${reading.reading_date || formatTs(reading.submitted_at)}</span></div>
        <div class="info-panel__row"><span class="info-panel__label">Prev. Reading</span><span class="info-panel__value">${reading.previous_reading != null ? Number(reading.previous_reading).toFixed(2) + ' KL' : '—'}</span></div>
        <div class="info-panel__row"><span class="info-panel__label">Current Reading</span><span class="info-panel__value">${reading.current_reading != null ? Number(reading.current_reading).toFixed(2) + ' KL' : '—'}</span></div>
        <div class="info-panel__row"><span class="info-panel__label">Consumption</span><span class="info-panel__value">${reading.consumption != null ? Number(reading.consumption).toFixed(2) + ' KL' : '—'}</span></div>
      `;

      if (!bill) {
        tbody.innerHTML = '<tr><td colspan="2" class="text-muted text-center">No bill calculated (Cannot Read or skipped).</td></tr>';
        document.getElementById('breakdownBillTotal').textContent = '—';
      } else {
        const rows = [];
        if (bill.slab_details && bill.slab_details.length > 0) {
          bill.slab_details.forEach(s => {
            rows.push(`<tr><td>Water (${s.slab}): ${Number(s.kl).toFixed(2)} KL × ₹${s.rate}</td><td>${formatCurrency(s.amount)}</td></tr>`);
          });
        } else if (bill.water_charge != null) {
          rows.push(`<tr><td>Water Charge</td><td>${formatCurrency(bill.water_charge)}</td></tr>`);
        }
        if (bill.minimum_charge_applied) rows.push(`<tr><td>Minimum Charge Applied</td><td>${formatCurrency(bill.minimum_charge_applied)}</td></tr>`);
        if (bill.fixed_charge) rows.push(`<tr><td>Fixed Charge</td><td>${formatCurrency(bill.fixed_charge)}</td></tr>`);
        if (bill.meter_service_charge) rows.push(`<tr><td>Meter Service Charge</td><td>${formatCurrency(bill.meter_service_charge)}</td></tr>`);
        if (bill.sewerage_charge) rows.push(`<tr><td>Sewerage Charge</td><td>${formatCurrency(bill.sewerage_charge)}</td></tr>`);
        if (bill.ids_charge) rows.push(`<tr><td>IDS Surcharge</td><td>${formatCurrency(bill.ids_charge)}</td></tr>`);
        if (bill.previous_outstanding) rows.push(`<tr><td>Previous Outstanding</td><td>${formatCurrency(bill.previous_outstanding)}</td></tr>`);
        if (bill.credit_applied) rows.push(`<tr><td>Credit Applied</td><td>−${formatCurrency(bill.credit_applied)}</td></tr>`);
        if (bill.lps_amount && bill.lps_amount > 0) rows.push(`<tr class="bill-preview__lps"><td>LPS (${bill.lps_type})</td><td>${formatCurrency(bill.lps_amount)}</td></tr>`);
        rows.push(`<tr class="bill-preview__subtotal"><td>Subtotal (before rounding)</td><td>${formatCurrency(bill.total_before_rounding)}</td></tr>`);
        tbody.innerHTML = rows.join('');
        document.getElementById('breakdownBillTotal').textContent = formatCurrency(bill.total_amount);
      }

      document.getElementById('breakdownModal').classList.remove('hidden');
      document.getElementById('breakdownModal').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function hideError() {
      document.getElementById('errorMsg').classList.add('hidden');
    }
  </script>
</body>
</html>
